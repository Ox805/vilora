{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Reset Password</h2>
        <div id="auth-error" class="error-msg" style="display:none"></div>
        <div id="success-msg" style="display:none; background: var(--intake-bg); padding: 0.75rem; border-radius: var(--radius); margin-bottom: 1rem; font-size: 0.9rem;">
            Your password has been reset. <a href="/login">Log in</a>
        </div>

        <form id="reset-form" onsubmit="handleReset(event)">
            <div class="form-group">
                <label for="password">New Password</label>
                <div class="password-field">
                    <input type="password" id="password" required placeholder="At least 6 characters" minlength="6">
                    <button type="button" class="password-toggle" onclick="togglePassword('password')" title="Show password">
                        <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        <svg class="eye-off-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <div class="password-field">
                    <input type="password" id="confirm" required placeholder="Re-enter your password" minlength="6">
                    <button type="button" class="password-toggle" onclick="togglePassword('confirm')" title="Show password">
                        <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        <svg class="eye-off-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="submit-btn">Reset Password</button>
        </form>

        <p class="auth-toggle">
            <a href="/login">Back to Login</a>
        </p>
    </div>
</div>

<script>
const RESET_TOKEN = "{{ token }}";

function togglePassword(fieldId) {
    const input = document.getElementById(fieldId);
    const field = input.closest('.password-field');
    const eyeOn = field.querySelector('.eye-icon');
    const eyeOff = field.querySelector('.eye-off-icon');
    if (input.type === 'password') {
        input.type = 'text';
        eyeOn.style.display = 'none';
        eyeOff.style.display = 'block';
    } else {
        input.type = 'password';
        eyeOn.style.display = 'block';
        eyeOff.style.display = 'none';
    }
}

async function handleReset(e) {
    e.preventDefault();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const errEl = document.getElementById('auth-error');

    if (password !== confirm) {
        errEl.textContent = 'Passwords do not match';
        errEl.style.display = 'block';
        return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Resetting...';

    try {
        const res = await fetch('/api/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: RESET_TOKEN, password })
        });
        const data = await res.json();
        if (data.success) {
            document.getElementById('reset-form').style.display = 'none';
            document.getElementById('success-msg').style.display = 'block';
            errEl.style.display = 'none';
        } else {
            errEl.textContent = data.error || 'Something went wrong';
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Reset Password';
        }
    } catch (err) {
        errEl.textContent = 'Connection error. Please try again.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Reset Password';
    }
}
</script>
{% endblock %}
