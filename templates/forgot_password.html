{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Forgot Password</h2>
        <p style="color: var(--text-light); margin-bottom: 1.5rem; font-size: 0.9rem;">
            Enter your email and we'll send you a link to reset your password.
        </p>
        <div id="auth-error" class="error-msg" style="display:none"></div>
        <div id="success-msg" style="display:none; background: var(--intake-bg); padding: 0.75rem; border-radius: var(--radius); margin-bottom: 1rem; font-size: 0.9rem;">
            If an account with that email exists, a reset link has been sent. Check your email.
        </div>

        <form id="forgot-form" onsubmit="handleForgot(event)">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="submit-btn">Send Reset Link</button>
        </form>

        <p class="auth-toggle">
            <a href="/login">Back to Login</a>
        </p>
    </div>
</div>

<script>
async function handleForgot(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Sending...';

    try {
        const res = await fetch('/api/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        const data = await res.json();
        document.getElementById('forgot-form').style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
    } catch (err) {
        const errEl = document.getElementById('auth-error');
        errEl.textContent = 'Something went wrong. Please try again.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
    }
}
</script>
{% endblock %}
