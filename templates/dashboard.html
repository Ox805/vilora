{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="dashboard">
    <div class="dashboard-header">
        <h1>Your Sessions</h1>
        <button onclick="showNewSession()" class="btn btn-primary">New Session</button>
    </div>

    <!-- New Session Modal -->
    <div id="new-session-modal" class="modal" style="display:none">
        <div class="modal-content">
            <h2>Start a New Mediation</h2>
            <form id="new-session-form" onsubmit="createSession(event)">
                <div class="form-group">
                    <label for="topic">What's the issue?</label>
                    <textarea id="topic" rows="2" required
                        placeholder="Brief description of the disagreement or issue"></textarea>
                </div>
                <div class="form-group">
                    <label for="session-type">Type of mediation</label>
                    <select id="session-type">
                        <option value="general">General</option>
                        <option value="relationship">Relationship</option>
                        <option value="family">Family</option>
                        <option value="workplace">Workplace</option>
                        <option value="roommate">Roommate / Housemate</option>
                        <option value="political">Political / Social Issues</option>
                        <option value="neighbor">Neighbor Dispute</option>
                        <option value="business">Business Partnership</option>
                        <option value="other">Other...</option>
                    </select>
                </div>
                <div class="form-group" id="other-type-group" style="display:none">
                    <label for="other-type">Describe the type of mediation</label>
                    <input type="text" id="other-type" placeholder="e.g. Community dispute, school conflict, etc." maxlength="80">
                </div>
                <div class="form-group">
                    <label for="perspective">Your perspective (private — shared only with the mediator)</label>
                    <textarea id="perspective" rows="4"
                        placeholder="Share your side of the story. This helps Vilora understand both viewpoints."></textarea>
                    <button type="button" onclick="helpFrame()" class="btn btn-sm btn-frame" id="frame-btn">
                        Help me frame this
                    </button>
                </div>
                <div id="frame-suggestion" class="frame-suggestion" style="display:none">
                    <div class="frame-suggestion-header">
                        <strong>Vilora's suggestions</strong>
                        <button type="button" onclick="dismissFraming()" class="btn btn-sm">Dismiss</button>
                    </div>
                    <div id="frame-content" class="frame-content"></div>
                </div>
                <div class="form-actions">
                    <button type="button" onclick="hideNewSession()" class="btn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create & Get Invite Link</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Invite Link Display -->
    <div id="invite-display" class="invite-card" style="display:none">
        <h3>Session Created!</h3>
        <p>Share this link with the other party:</p>
        <div class="invite-link-row">
            <input type="text" id="invite-link" readonly>
            <button onclick="copyInviteLink()" class="btn btn-sm">Copy</button>
        </div>
        <button onclick="goToSession()" class="btn btn-primary">Enter Session</button>
    </div>

    <!-- Session List -->
    <div id="session-list" class="session-list">
        <p class="loading">Loading your sessions...</p>
    </div>
</div>

<script>
let currentSessionId = null;

function showNewSession() {
    document.getElementById('new-session-modal').style.display = 'flex';
}
function hideNewSession() {
    document.getElementById('new-session-modal').style.display = 'none';
}

async function helpFrame() {
    const topic = document.getElementById('topic').value.trim();
    const perspective = document.getElementById('perspective').value.trim();
    let type = document.getElementById('session-type').value;
    if (type === 'other') {
        type = document.getElementById('other-type').value.trim() || 'general';
    }

    if (!topic && !perspective) {
        alert('Please describe the issue or share your perspective first.');
        return;
    }

    const btn = document.getElementById('frame-btn');
    btn.disabled = true;
    btn.textContent = 'Thinking...';

    try {
        const res = await fetch('/api/frame', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ topic, perspective, type })
        });
        const data = await res.json();
        if (data.success) {
            const container = document.getElementById('frame-suggestion');
            const content = document.getElementById('frame-content');
            content.innerHTML = formatFraming(data.suggestion);
            container.style.display = 'block';
        } else {
            alert(data.error || 'Could not generate suggestion.');
        }
    } catch (err) {
        alert('Error: ' + err.message);
    } finally {
        btn.disabled = false;
        btn.textContent = 'Help me frame this';
    }
}

function formatFraming(text) {
    return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
}

function dismissFraming() {
    document.getElementById('frame-suggestion').style.display = 'none';
}

document.getElementById('session-type').addEventListener('change', function() {
    const otherGroup = document.getElementById('other-type-group');
    otherGroup.style.display = this.value === 'other' ? 'block' : 'none';
    if (this.value === 'other') document.getElementById('other-type').focus();
});

async function createSession(e) {
    e.preventDefault();
    const topic = document.getElementById('topic').value;
    let type = document.getElementById('session-type').value;
    if (type === 'other') {
        type = document.getElementById('other-type').value.trim() || 'general';
    }
    const perspective = document.getElementById('perspective').value;

    let res, data;
    try {
        res = await fetch('/api/sessions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ topic, type, perspective })
        });
        data = await res.json();
    } catch (err) {
        alert('Error creating session: ' + err.message);
        return;
    }
    if (data.success) {
        currentSessionId = data.session.id;
        document.getElementById('invite-link').value = data.invite_link;
        hideNewSession();
        document.getElementById('invite-display').style.display = 'block';
        loadSessions();
    }
}

function copyInviteLink() {
    const input = document.getElementById('invite-link');
    input.select();
    navigator.clipboard.writeText(input.value);
}

function goToSession() {
    if (currentSessionId) {
        window.location.href = '/session/' + currentSessionId;
    }
}

async function loadSessions() {
    const res = await fetch('/api/sessions');
    const data = await res.json();
    const list = document.getElementById('session-list');

    if (!data.sessions || data.sessions.length === 0) {
        list.innerHTML = '<p class="empty-state">No sessions yet. Start one to begin mediating.</p>';
        return;
    }

    list.innerHTML = data.sessions.map(s => `
        <div class="session-card-wrapper">
            <a href="/session/${s.id}" class="session-card">
                <div class="session-card-header">
                    <span class="session-type-badge">${s.session_type}</span>
                    <span class="session-status ${s.status}">${s.status}</span>
                </div>
                <h3>${escapeHtml(s.topic)}</h3>
                <p class="session-date">${new Date(s.created_at).toLocaleDateString()} ${new Date(s.created_at).toLocaleTimeString()}</p>
            </a>
            <button onclick="deleteSession(${s.id}, event)" class="btn btn-sm btn-delete" title="Delete session">Delete</button>
        </div>
    `).join('');
}

async function deleteSession(id, e) {
    e.stopPropagation();
    if (!confirm('Delete this session? This cannot be undone.')) return;

    const res = await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.success) loadSessions();
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

loadSessions();
</script>
{% endblock %}
