<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vilora{% endblock %} — Vilora</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">Vilora</a>
        <div class="nav-links">
            {% if current_user.is_authenticated %}
                <a href="/dashboard">Dashboard</a>
                <span class="nav-user">{{ current_user.display_name }}</span>
                <button onclick="logout()" class="btn btn-sm">Logout</button>
            {% else %}
                <a href="/login" class="btn btn-sm">Login</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Vilora — Strength through dialogue</p>
    </footer>

    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
