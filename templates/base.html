<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vilora{% endblock %} — Vilora</title>
    <meta name="description" content="Vilora is an AI facilitator that helps people think together. Resolve conflicts, brainstorm ideas, make decisions, or just talk things through.">
    <meta property="og:title" content="Vilora — Better conversations. Better outcomes.">
    <meta property="og:description" content="An AI facilitator for productive dialogue. Resolve conflicts, brainstorm ideas, make tough decisions, or talk things through one-on-one.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.vilora.ai">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon.svg') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <svg class="nav-logo-mark" width="36" height="36" viewBox="0 0 58 58" xmlns="http://www.w3.org/2000/svg">
                <path d="M 8 9 C 6 26,23 43,29 47 M 18 9 C 17 28,25 44,29 47 M 8 9 L 18 9" fill="none" stroke="#1D9E75" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M 50 9 C 52 26,35 43,29 47 M 40 9 C 41 28,33 44,29 47 M 40 9 L 50 9" fill="none" stroke="#1D9E75" stroke-width="1.8" stroke-linecap="round"/>
                <circle cx="29" cy="47" r="3" fill="#085041"/>
            </svg>
            <span class="nav-wordmark">VILORA</span>
        </a>
        <div class="nav-links">
            {% if current_user.is_authenticated %}
                <a href="/dashboard">Dashboard</a>
                <a href="/about-me">About Me</a>
                <a href="/settings">Settings</a>
                <span class="nav-user">{{ current_user.display_name }}</span>
                <button onclick="logout()" class="btn btn-sm">Logout</button>
            {% else %}
                <a href="/login" class="btn btn-sm">Login</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Vilora — Strength through dialogue</p>
    </footer>

    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/voice.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
