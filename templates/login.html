{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 id="auth-title">Login</h2>
        <div id="auth-error" class="error-msg" style="display:none"></div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group" id="name-group" style="display:none">
                <label for="display_name">Display Name</label>
                <input type="text" id="display_name" placeholder="How should others see you?">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-field">
                    <input type="password" id="password" required placeholder="Your password">
                    <button type="button" class="password-toggle" onclick="togglePassword()" title="Show password">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Login</button>
        </form>

        <p class="auth-toggle">
            <a href="/forgot-password">Forgot password?</a>
        </p>
        <p class="auth-toggle">
            <span id="toggle-text">Don't have an account?</span>
            <a href="#" onclick="toggleAuth(event)">
                <span id="toggle-link">Register</span>
            </a>
        </p>
    </div>
</div>

<script>
let isLogin = true;

function togglePassword() {
    const input = document.getElementById('password');
    const eyeOn = document.getElementById('eye-icon');
    const eyeOff = document.getElementById('eye-off-icon');
    if (input.type === 'password') {
        input.type = 'text';
        eyeOn.style.display = 'none';
        eyeOff.style.display = 'block';
    } else {
        input.type = 'password';
        eyeOn.style.display = 'block';
        eyeOff.style.display = 'none';
    }
}

function toggleAuth(e) {
    e.preventDefault();
    isLogin = !isLogin;
    document.getElementById('auth-title').textContent = isLogin ? 'Login' : 'Register';
    document.getElementById('name-group').style.display = isLogin ? 'none' : 'block';
    document.getElementById('toggle-text').textContent = isLogin ? "Don't have an account?" : 'Already have an account?';
    document.getElementById('toggle-link').textContent = isLogin ? 'Register' : 'Login';
    document.getElementById('auth-error').style.display = 'none';
}

async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const display_name = document.getElementById('display_name').value;

    const endpoint = isLogin ? '/api/login' : '/api/register';
    const body = isLogin ? { email, password } : { email, password, display_name };

    try {
        const res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const data = await res.json();
        if (data.success) {
            window.location.href = data.redirect || '/dashboard';
        } else {
            const errEl = document.getElementById('auth-error');
            errEl.textContent = data.error || 'Something went wrong';
            errEl.style.display = 'block';
        }
    } catch (err) {
        const errEl = document.getElementById('auth-error');
        errEl.textContent = 'Connection error. Please try again.';
        errEl.style.display = 'block';
    }
}
</script>
{% endblock %}
